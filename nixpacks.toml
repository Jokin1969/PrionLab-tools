[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.pip", "tesseract"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  "printf '\\nPATH=/opt/venv/bin:$PATH' >> /root/.profile",
  "cd prionread/frontend && npm install"
]

[phases.build]
cmds = ["cd prionread/frontend && npm run build"]

[start]
cmd = "/opt/venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
