{% extends "base.html" %}

{% block title %}{{ tool_name }} — PrionLab Tools{% endblock %}

{% block content %}
<div class="coming-soon">
  <div class="coming-soon__icon">&#9203;</div>
  <h1 class="coming-soon__title">{{ tool_name }}</h1>
  <p class="coming-soon__tag">{{ _('Coming soon') }}</p>
  <p class="coming-soon__msg">{{ _('This tool is under development and will be available soon.') }}</p>
  <a href="{{ url_for('home') }}" class="btn btn--secondary">{{ _('Back to Home') }}</a>
</div>
{% endblock %}
