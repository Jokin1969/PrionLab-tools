  <line x1="16" y1="26" x2="27" y2="27" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="31" x2="27" y2="32" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="36" x2="27" y2="37" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Reading lines on right page -->
  <line x1="37" y1="27" x2="48" y2="26" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="37" y1="32" x2="48" y2="31" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="37" y1="37" x2="48" y2="36" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
