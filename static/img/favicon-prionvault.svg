<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0F3460"/>
  <!-- Vault door: outer ring -->
  <circle cx="32" cy="31" r="18" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <!-- Vault door: inner circle -->
  <circle cx="32" cy="31" r="11" fill="white" opacity="0.15"/>
  <!-- Vault spokes -->
  <line x1="32" y1="13" x2="32" y2="49" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="14" y1="31" x2="50" y2="31" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="19.3" y1="18.3" x2="44.7" y2="43.7" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="44.7" y1="18.3" x2="19.3" y2="43.7" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <!-- Center lock knob -->
  <circle cx="32" cy="31" r="5" fill="white" opacity="0.9"/>
  <circle cx="32" cy="31" r="2.5" fill="#0F3460"/>
  <!-- Handle -->
  <rect x="44" y="28.5" width="8" height="5" rx="2.5" fill="white" opacity="0.85"/>
